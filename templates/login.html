<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qbox AI - Masuk Panel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 p-8 space-y-6 transition-all hover:shadow-2xl duration-300">
        <div class="text-center space-y-2">
            <div class="inline-flex p-3 bg-indigo-50 text-indigo-600 rounded-2xl shadow-sm mb-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Qbox AI</h2>
            <p class="text-sm text-slate-500">Dashboard Management</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="p-3.5 rounded-xl bg-rose-50 border border-rose-100 text-rose-700 text-xs font-semibold text-center shadow-sm">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Username</label>
                <div class="relative">
                    <input type="text" id="username" name="username" required placeholder="Masukkan username admin"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all placeholder:text-slate-400 bg-slate-50/50">
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all placeholder:text-slate-400 bg-slate-50/50">
            </div>

            <button type="submit" 
                class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-lg shadow-indigo-600/20 transition-all text-sm active:scale-[0.98] tracking-wide mt-2">
                Masuk ke Dashboard
            </button>
        </form>

        <div class="text-center pt-2 border-t border-slate-100">
            <a href="{{ url_for('index') }}" class="text-xs text-slate-400 hover:text-indigo-500 transition-colors">
                &larr; Kembali ke Pusat Bantuan Pelanggan
            </a>
        </div>
    </div>

</body>
</html>
